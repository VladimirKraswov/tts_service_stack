services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tts_admin}
      POSTGRES_USER: ${POSTGRES_USER:-tts_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tts_admin_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tts_admin} -d ${POSTGRES_DB:-tts_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://tts_admin:tts_admin_change_me@postgres:5432/tts_admin}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_DIR: /data
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      HF_HOME: /data/huggingface
      HUGGINGFACE_HUB_CACHE: /data/huggingface/hub
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"

  trainer:
    build:
      context: ./backend
    command: ["python", "-m", "app.trainer.runner"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://tts_admin:tts_admin_change_me@postgres:5432/tts_admin}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_DIR: /data
      HF_HOME: /data/huggingface
      HUGGINGFACE_HUB_CACHE: /data/huggingface/hub
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
